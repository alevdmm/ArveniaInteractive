<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Titulo1 | Arvenia Interactive</title>
        <link rel="icon" type="image/png" href="imagenes/ArveniaInteractive1.png">
        <link rel='stylesheet' href='Titulo.css' />
        <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;700&display=swap'>
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body> 
        <!-- Content -->
        <div class='content'>
        
            <!-- Taskbar -->
            <div class='taskbar'>
                <div class='taskbar-background'></div>
                <img class='taskbar-logo' src='imagenes/ArveniaInteractive3.png'/>
                <input type="checkbox" id="s">
                <label for='s' class='taskbar-sidebar'>
                    <img src='imagenes/Sidebar.png'/>
                </label>
                                <div class='sidebar'>
                    <a class='sidebar-home' href='Arvenia.html'>Home</a>
                    <a class='sidebar-news' href='Arvenia.html'>News</a>
                    <a class='sidebar-community' href=Arvenia.html#community>Community</a>
                    <a class='sidebar-games' href='Games.html'>Games</a>
                    <a class='sidebar-team'>Our team</a>
                </div>

                <a href="#top" class="taskbar-home"><h1>Home</h1></a>
                <input class='taskbar-searchbar' type='search' placeholder='Search' list='game-list'/>
                
                <datalist id='game-list'>
                    <option value="Titulo1">
                    <option value="Titulo2">
                    <option value="Titulo3">
                    <option value="Titulo4">
                </datalist>
                
                <!-- Game -->
                <div class='game-zone'>
                    <div class='game-card'>
                        <img class='game-card-img' src='imagenes/game1.png'/>
                        <div class='game-card-info'>
                            <div class='game-card-top'>
                                <h3>GAME TITLE</h3>
                            </div>
                            <div class='game-card-mid'>
                                <p>Experience the next level of interactive entertainment. 
                                   Explore new worlds and challenge your skills in our latest release.</p>
                            </div>
                            <div class='game-card-bottom'>
                                <a class='game-btn' href='#'>PLAY NOW</a>
                            </div>
                        </div>
                    </div>
                </div>    
            </div>
        </div>
    </body>
</html>
